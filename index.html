<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIMMY LIU — Photography / Film Portfolio</title>
<meta name="description" content="Photography and film portfolio">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">JIMMY LIU</a>
    <nav class="nav">

    </nav>
    <button class="nav-toggle" aria-label="Open menu">☰</button>
  </div>

<section class="hero" data-hero>

  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1 data-hero-title></h1>

<footer class="site-footer">

</footer>

<div class="lightbox" data-lightbox>
  <button class="lightbox-close" data-lightbox-close aria-label="Close">✕</button>

  <div class="lightbox-stage" data-lightbox-stage></div>
  <button class="lightbox-nav lightbox-next" data-lightbox-next aria-label="Next">›</button>
  <div class="lightbox-info">
    <h4 data-lightbox-title></h4>
